# Render.com: New → Blueprint → репозиторий → Apply
# Один контейнер: статика + FastAPI на одном https://… (вход без VITE_API_BASE_URL)
# Первая сборка долгая (PyTorch + модель эмбеддингов при первом запросе)
#
# Подключите Render PostgreSQL и задайте в Environment переменную DATABASE_URL
# (внутренний URL из панели; при необходимости замените схему на postgresql+psycopg://…).
#
# ВАЖНО — где лежит корень Git:
# • Репозиторий = только этот проект (в корне лежат Dockerfile, frontend/, backend/ рядом
#   с ЭТИМ файлом) — оставьте как ниже, rootDir не нужен.
# • Репозиторий выше по дереву (например папка «диплом» с подпапкой edda-portal) —
#   файл render.yaml должен быть в КОРНЕ репозитория с rootDir: edda-portal.
#   В этом проекте см. ../render.yaml

services:
  - type: web
    name: edda-portal
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      # Обязательно: без DATABASE_URL backend падает на старте (дефолт 127.0.0.1 в контейнере недоступен).
      # Dashboard → Environment → Add: DATABASE_URL = строка Supabase Session pooler (postgresql+psycopg://…?sslmode=require).
      # Или подключите Render Postgres и скопируйте Internal Database URL (схему замените на postgresql+psycopg://).
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHONUNBUFFERED
        value: "1"
      # Render Free = 512MB RAM: PyTorch+SentenceTransformer при старте не помещаются.
      # Псевдо-эмбеддинги (хуже RAG, но вход и приложение работают). Для нормального RAG: plan standard (2GB) и уберите эту переменную.
      - key: EDDA_USE_HASH_EMBEDDINGS
        value: "1"
