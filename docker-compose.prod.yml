# Полный стек: FastAPI + статика Vite + PostgreSQL (pgvector).
#
# Запуск: из каталога edda-portal
#   export JWT_SECRET="$(openssl rand -hex 32)"
#   docker compose -f docker-compose.prod.yml up -d --build
# Откройте http://127.0.0.1:8000 (за reverse-proxy — ваш домен).
#
# Свой домен: задайте CORS_ORIGINS=https://ваш-домен.ru в .env рядом с compose
# или в environment ниже.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: edda
      POSTGRES_PASSWORD: edda
      POSTGRES_DB: edda
    volumes:
      - edda_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edda -d edda"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql+psycopg://edda:edda@db:5432/edda
      JWT_SECRET: ${JWT_SECRET:-change-me-set-JWT_SECRET-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - edda_uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  edda_pg:
  edda_uploads:
