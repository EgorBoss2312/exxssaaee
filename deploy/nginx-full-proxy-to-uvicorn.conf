# Рекомендуется, если фронт собран в образ по корневому Dockerfile:
# статика и /api обслуживает один процесс Uvicorn (см. backend/app/main.py).
# Nginx только терминирует TLS и проксирует ВСЁ на бэкенд — так не возникает
# ситуации, когда / отдаётся из каталога dist, а /api «теряется» (404 / Failed to fetch).
#
# Подставьте server_name и пути к сертификатам; Uvicorn слушает 127.0.0.1:8000
# (или имя сервиса Docker: web:8000 внутри user-defined network).

server {
    listen 443 ssl http2;
    server_name example.com;

    # ssl_certificate /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name example.com;
    return 301 https://$host$request_uri;
}
