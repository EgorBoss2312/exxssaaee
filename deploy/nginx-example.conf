# Пример: один домен, статика фронта + Uvicorn на 127.0.0.1:8000
# Важно: location /api/ должен проксироваться на бэкенд; иначе /api уйдёт в try_files и логин даст «Failed to fetch».

server {
    listen 443 ssl;
    server_name example.com;

    # ssl_certificate ...;

    root /var/www/edda-portal/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /assets/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
